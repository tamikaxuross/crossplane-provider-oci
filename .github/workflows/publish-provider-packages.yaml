name: Publish Provider Packages

on:
  workflow_dispatch:
    inputs:
      subpackages:
        description: 'Subpackages to be built individually (e.g. config,containerengine or "all" for all services)'
        default: 'all'
        required: true

      version:
        description: "Version string to use while publishing the packages (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      platform:
        type: choice
        description: "Platform string to use while building and publishing the packages (e.g. linux_amd64 linux_arm64)"
        default: linux_amd64 linux_arm64
        options:
        - linux_amd64 linux_arm64
        - linux_amd64
        - linux_arm64
        required: true
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25'
        required: false
      size:
        description: "Number of smaller provider packages to build and push with each build job"
        default: '30'
        required: true
env:
  # Common versions
  DOCKER_BUILDX_VERSION: 'v0.20.1'
  UP_VERSION: 'v0.37.1'

  # Registry/Org names
  CROSSPLANE_REGORG: 'ghcr.io/${{ github.repository_owner }}' # xpkg.crossplane.io/crossplane-contrib
jobs:
  index:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.calc.outputs.indices }}
      subpackages: ${{ steps.calc.outputs.subpackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4

      - id: calc
        run: |
          if [ "${{ inputs.subpackages }}" = "all" ]; then
            SERVICES_LIST=$(find examples-generated/cluster -mindepth 1 -maxdepth 1 -type d 2>/dev/null | xargs -n1 basename | tr '\n' ',' | sed 's/,$//' || echo "")
            if [ -n "$SERVICES_LIST" ]; then
              SUBPACKAGES="config,$SERVICES_LIST"
            else
              SUBPACKAGES="config"
            fi
          else
            SUBPACKAGES="${{ inputs.subpackages }}"
          fi
          python3 -c "import math; print(f'indices={list(range(0, math.ceil(len(\"$SUBPACKAGES\".split(',')) / int(\"${{ inputs.size }}\"))))}')" >> "$GITHUB_OUTPUT"
          echo "subpackages=$SUBPACKAGES" >> "$GITHUB_OUTPUT"

  publish-artifacts:
    strategy:
      matrix:
        index: ${{ fromJSON(needs.index.outputs.indices) }}

    needs: index
    runs-on: ubuntu-latest
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@2b82ce82d56a2a04d2637cd93a637ae1b359c0a7 # v2
        with:
          platforms: all

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@885d1462b80bc1c1c7f0b00334ad271f09369c55 # v2
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}
          install: true

      - name: Login to GHCR using PAT
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@6edd4406fa81c3da01a34fa6f6343087c207a568 # v3
        with:
          go-version: ${{ inputs.go-version }}

      - name: Find the Go Build Cache
        id: go_cache
        run: |
          echo "cache=$(make go.cachedir)" >> $GITHUB_OUTPUT && \
          echo "mod_cache=$(make go.mod.cachedir)" >> $GITHUB_OUTPUT

      - name: Cache the Go Build Cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.cache }}
          key: ${{ runner.os }}-build-publish-artifacts-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-publish-artifacts-

      - name: Cache Go Dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ${{ steps.go_cache.outputs.mod_cache }}
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Vendor Dependencies
        run: make vendor vendor.check

      - name: Calculate packages to build & push
        id: packages
        run: |
          PACKAGES_BATCH=$(python3 -c "
          all_packages = \"${{ needs.index.outputs.subpackages }}\".split(',')
          start_idx = int(\"${{ matrix.index }}\") * int(\"${{ inputs.size }}\")
          batch = all_packages[start_idx:start_idx + int(\"${{ inputs.size }}\")]
          if 'config' not in batch:
              batch = ['config'] + batch
          print(','.join(batch))
          ")
          echo "packages_batch=$PACKAGES_BATCH" >> "$GITHUB_OUTPUT"

      - name: Build Artifacts
        id: build_artifacts
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          make generate
          make SUBPACKAGES="${{ steps.packages.outputs.packages_batch }}" PLATFORMS="${{ inputs.platform }}" build
        env:
          # We're using docker buildx, which doesn't actually load the images it
          # builds by default. Specifying --load does so.
          BUILD_ARGS: "--load"

      - name: Publish Artifacts
        run: |
          make SUBPACKAGES_FOR_BATCH="${{ steps.packages.outputs.packages_batch }}" XPKG_REG_ORGS="${{ env.CROSSPLANE_REGORG }}" VERSION=${{ inputs.version }} BATCH_PLATFORMS="$(echo ${{ inputs.platform }} | tr ' ' ',')" publish-subpackages
