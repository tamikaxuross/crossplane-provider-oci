apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: DhcpOptions
metadata:
  labels:
    testing.upbound.io/example-name: dhcpoptions_label_1
  name: dhcpoptions1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: dhcpoptions1
    options:
      - serverType: VcnLocalPlusInternet
        type: DomainNameServer
      - searchDomainNames:
          - test.com
        type: SearchDomain
    vcnIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vcn_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
