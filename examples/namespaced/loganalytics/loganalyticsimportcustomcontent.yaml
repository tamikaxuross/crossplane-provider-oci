apiVersion: loganalytics.oci.m.upbound.io/v1alpha1
kind: LogAnalyticsImportCustomContent
metadata:
  annotations:
    meta.upbound.io/example-id: loganalytics/v1alpha1/loganalyticsimportcustomcontent
  labels:
    testing.upbound.io/example-name: importCustomContentNew
  name: importcustomcontentnew
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    importCustomContentFile: ./files/TFSource1.zip
    namespace: ${data.oci_objectstorage_namespace.ns.namespace}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
