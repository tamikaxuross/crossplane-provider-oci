apiVersion: loganalytics.oci.m.upbound.io/v1alpha1
kind: Namespace
metadata:
  annotations:
    meta.upbound.io/example-id: loganalytics/v1alpha1/namespace
  labels:
    testing.upbound.io/example-name: test_namespace
  name: test-namespace
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    isOnboarded: false
    namespace: ${data.oci_log_analytics_namespaces.test_namespaces.namespace_collection.0.items.0.namespace}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
