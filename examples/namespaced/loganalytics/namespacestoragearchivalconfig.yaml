apiVersion: loganalytics.oci.m.upbound.io/v1alpha1
kind: NamespaceStorageArchivalConfig
metadata:
  annotations:
    meta.upbound.io/example-id: loganalytics/v1alpha1/namespacestoragearchivalconfig
  labels:
    testing.upbound.io/example-name: test_namespace_storage_archival_config
  name: test-namespace-storage-archival-config
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    archivingConfiguration:
      - activeStorageDuration: ${var.namespace_storage_archival_config_archiving_configuration_active_storage_duration}
        archivalStorageDuration: ${var.namespace_storage_archival_config_archiving_configuration_archival_storage_duration}
    namespace: ${data.oci_log_analytics_namespaces.test_namespaces.namespace_collection.0.items.0.namespace}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
