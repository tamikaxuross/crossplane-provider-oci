apiVersion: blockchain.oci.m.upbound.io/v1alpha1
kind: Osn
metadata:
  annotations:
    meta.upbound.io/example-id: blockchain/v1alpha1/osn
  labels:
    testing.upbound.io/example-name: test_osn
  name: test-osn
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    ad: AD1
    blockchainPlatformIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_blockchain_platform
    ocpuAllocationParam:
      - ocpuAllocationNumber: "0.0"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
