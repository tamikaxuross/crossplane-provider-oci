apiVersion: dataflow.oci.m.upbound.io/v1alpha1
kind: PrivateEndpoint
metadata:
  annotations:
    meta.upbound.io/example-id: dataflow/v1alpha1/privateendpoint
  labels:
    testing.upbound.io/example-name: test_private_endpoint
  name: test-private-endpoint
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: description
    displayName: pe_name
    dnsZones:
      - custpvtsubnet.oraclevcn.com
    freeformTags:
      Department: Finance
    maxHostCount: "256"
    nsgIdsRefs:
      - name: test_network_security_group
    scanDetails:
      - fqdn: scan.test.com
        port: "1521"
    subnetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_subnet
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
