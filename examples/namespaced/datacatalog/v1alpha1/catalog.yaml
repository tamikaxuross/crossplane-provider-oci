apiVersion: datacatalog.oci.m.upbound.io/v1alpha1
kind: Catalog
metadata:
  labels:
    testing.upbound.io/example-name: catalog_label_1
  name: catalog1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: catalog1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
