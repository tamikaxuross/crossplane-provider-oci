apiVersion: datacatalog.oci.m.upbound.io/v1alpha1
kind: CatalogPrivateEndpoint
metadata:
  labels:
    testing.upbound.io/example-name: catalogprivateendpoint_label_1
  name: catalogprivateendpoint1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: catalogprivateendpoint1
    dnsZones:
      - example.internal
      - datacatalog.example.internal
    subnetIdSelector:
      matchLabels:
        testing.upbound.io/example-name: subnet_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
