apiVersion: bds.oci.m.upbound.io/v1alpha1
kind: BdsInstancePatchAction
metadata:
  annotations:
    meta.upbound.io/example-id: bds/v1alpha1/bdsinstancepatchaction
  labels:
    testing.upbound.io/example-name: test_bds_instance_patch_action
  name: test-bds-instance-patch-action
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    bdsInstanceId: ${var.bds_instance_id}
    clusterAdminPasswordSecretRef:
      key: example-key
      name: example-secret
      namespace: upbound-system
    version: ${var.bds_instance_patch_action_version}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
