apiVersion: bds.oci.m.upbound.io/v1alpha1
kind: BdsCapacityReport
metadata:
  annotations:
    meta.upbound.io/example-id: bds/v1alpha1/bdscapacityreport
  labels:
    testing.upbound.io/example-name: test_bds_capacity_report
  name: test-bds-capacity-report
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    shapeAvailabilities:
      - shape: ${var.shape}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
