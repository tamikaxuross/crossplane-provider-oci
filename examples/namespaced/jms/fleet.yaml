apiVersion: jms.oci.m.upbound.io/v1alpha1
kind: Fleet
metadata:
  annotations:
    meta.upbound.io/example-id: jms/v1alpha1/fleet
  labels:
    testing.upbound.io/example-name: example_fleet
  name: example-fleet
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: Example Fleet created by Terraform
    displayName: Example Fleet
    freeformTags: ${var.fleet_freeform_tags}
    inventoryLog:
      - logGroupId: ${var.fleet_log_group_ocid}
        logId: ${var.fleet_inventory_log_ocid}
    operationLog:
      - logGroupId: ${var.fleet_log_group_ocid}
        logId: ${var.fleet_operation_log_ocid}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
