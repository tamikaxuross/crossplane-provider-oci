apiVersion: compute.oci.m.upbound.io/v1alpha1
kind: InstanceMaintenanceEvent
metadata:
  labels:
    testing.upbound.io/example-name: instancemaintenanceevent_label_1
  name: instancemaintenanceevent1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    canDeleteLocalStorage: true
    displayName: instancemaintenanceevent1
    instanceMaintenanceEventId: ${INSTANCEMAINTENANCEEVENT_ID}
    timeWindowStart: "2026-01-01T23:00:00Z"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
