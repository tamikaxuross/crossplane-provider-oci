apiVersion: cloudguard.oci.m.upbound.io/v1alpha1
kind: ManagedList
metadata:
  annotations:
    meta.upbound.io/example-id: cloudguard/v1alpha1/managedlist
  labels:
    testing.upbound.io/example-name: test_managed_list
  name: test-managed-list
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.managed_list_description}
    displayName: ${var.managed_list_display_name}
    listItems: ${var.managed_list_list_items}
    listType: ${var.managed_list_list_type}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
