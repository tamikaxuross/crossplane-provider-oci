apiVersion: datascience.oci.m.upbound.io/v1alpha1
kind: MlApplication
metadata:
  annotations:
    meta.upbound.io/example-id: datascience/v1alpha1/mlapplication
  labels:
    testing.upbound.io/example-name: test_ml_application
  name: test-ml-application
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.ml_application_description}
    freeformTags: ${var.ml_application_freeform_tags}
    name: ${var.ml_application_name}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
