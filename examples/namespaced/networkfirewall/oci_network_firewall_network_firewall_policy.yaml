apiVersion: network.oci.m.upbound.io/v1alpha1
kind: FirewallNetworkFirewallPolicy
metadata:
  name: nwfwpolicy-via-crossplane
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdRef:
      name: compartment-via-crossplane1
    decryptionProfiles:
      - key: "decrypt"
        type: "SslInboundInspection"
    applicationLists:
      - key: "appList1"
        type: "TCP"
        minimumPort: 0
        maximumPort: 100
    ipAddressLists:
      - ipAddressListName: "ipa"
        ipAddressListValue:
          - 1.1.1.1
          - 2.2.2.2
      - ipAddressListName: "ipb"
        ipAddressListValue:
          - 1.2.2.1
          - 2.2.3.2
    decryptionRules:
      - name: "test-security-rules"
        condition:
          - destinations:
              - ipa
            sources:
              - ipb
        action: "NO_DECRYPT"
    securityRules:
      - name: "security-rules"
        condition:
          - applications:
              - appList1
            sources:
              - ipb
            destinations:
              - ipa
        action: "ALLOW"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
