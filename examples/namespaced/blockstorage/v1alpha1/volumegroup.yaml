apiVersion: blockstorage.oci.m.upbound.io/v1alpha1
kind: VolumeGroup
metadata:
  labels:
    testing.upbound.io/example-name: volumegroup_label_1
  name: volumegroup1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # Refer to following terraform example for brief resource fields
    # https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/core_volume_group
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    availabilityDomain: ${AVAILABILITY_DOMAIN}
    displayName: volumegroup1
    sourceDetails:
      - type: volumeIds
        volumeIdsSelector:
          matchLabels:
            testing.upbound.io/example-name: volume_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
