apiVersion: blockstorage.oci.m.upbound.io/v1alpha1
kind: VolumeBackup
metadata:
  labels:
    testing.upbound.io/example-name: volumebackup_label_1
  name: volumebackup1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # Refer to following terraform example for brief resource fields
    # https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/core_volume_backup
    volumeIdSelector:
      matchLabels:
        testing.upbound.io/example-name: volume_label_1
    displayName: volumebackup1
    type: FULL
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
