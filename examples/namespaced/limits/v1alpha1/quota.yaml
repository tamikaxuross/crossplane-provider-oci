apiVersion: limits.oci.m.upbound.io/v1alpha1
kind: Quota
metadata:
  labels:
    testing.upbound.io/example-name: quota_label_1
  name: quota1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentId: "${TENANCY_OCID}"
    description: "Test quota"
    name: quota1
    statements:
      - "set vcn quota to 2 in compartment ${COMPARTMENT_NAME}"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
