apiVersion: iot.oci.m.upbound.io/v1alpha1
kind: DigitalTwinInstance
metadata:
  annotations:
    meta.upbound.io/example-id: iot/v1alpha1/digitaltwininstance
  labels:
    testing.upbound.io/example-name: test_digital_twin_instance
  name: test-digital-twin-instance
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    authId: ${var.auth_ocid}
    description: ${var.digital_twin_instance_description}
    digitalTwinAdapterId: ${var.digital_twin_adapter_ocid}
    displayName: ${var.digital_twin_instance_display_name}
    externalKey: ${var.digital_twin_instance_external_key}
    freeformTags: ${var.digital_twin_instance_freeform_tags}
    iotDomainId: ${var.iot_domain_ocid}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
