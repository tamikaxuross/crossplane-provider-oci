apiVersion: generativeai.oci.m.upbound.io/v1alpha1
kind: AgentDataIngestionJob
metadata:
  annotations:
    meta.upbound.io/example-id: generativeai/v1alpha1/agentdataingestionjob
  labels:
    testing.upbound.io/example-name: test_data_ingestion_job
  name: test-data-ingestion-job
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    dataSourceIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_data_source
    description: ${var.test_data_ingestion_job_description}
    displayName: ${var.test_data_ingestion_job_display_name}
    freeformTags: ${var.test_freeform_tags}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
