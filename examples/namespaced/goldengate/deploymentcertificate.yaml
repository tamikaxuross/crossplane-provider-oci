apiVersion: goldengate.oci.m.upbound.io/v1alpha1
kind: DeploymentCertificate
metadata:
  annotations:
    meta.upbound.io/example-id: goldengate/v1alpha1/deploymentcertificate
  labels:
    testing.upbound.io/example-name: certificate
  name: certificate
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    certificateContent: ${var.certificate_content}
    deploymentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_deployment
    key: certificate
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
