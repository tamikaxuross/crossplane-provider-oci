apiVersion: goldengate.oci.m.upbound.io/v1alpha1
kind: Pipeline
metadata:
  annotations:
    meta.upbound.io/example-id: goldengate/v1alpha1/pipeline
  labels:
    testing.upbound.io/example-name: test_pipeline
  name: test-pipeline
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: ${var.display_name}
    licenseModel: ${var.license_model}
    recipeType: ${var.recipe_type}
    sourceConnectionDetails:
      - connectionId: ${var.source_connection_id}
    subnetId: ${var.test_subnet_id}
    targetConnectionDetails:
      - connectionId: ${var.target_connection_id}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
