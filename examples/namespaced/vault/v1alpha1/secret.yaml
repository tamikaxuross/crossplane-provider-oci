apiVersion: vault.oci.m.upbound.io/v1alpha1
kind: Secret
metadata:
  name: secret1
  labels:
    testing.upbound.io/example-name: secret_label_1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    keyIdSelector:
      matchLabels:
        testing.upbound.io/example-name: key_label_1
    secretName: secret1
    secretContent:
      - content: "asdsfgewr"
        contentType: "BASE64"
    vaultIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vault_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
