apiVersion: apigateway.oci.m.upbound.io/v1alpha1
kind: UsagePlan
metadata:
  labels:
    testing.upbound.io/example-name: usageplan_label_1
  name: usageplan1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    displayName: usageplan1
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    entitlements:
      - name: "basicentitlement"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
