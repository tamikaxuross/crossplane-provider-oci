apiVersion: osmanagementhub.oci.m.upbound.io/v1alpha1
kind: ManagedInstanceAttachProfileManagement
metadata:
  annotations:
    meta.upbound.io/example-id: osmanagementhub/v1alpha1/managedinstanceattachprofilemanagement
  labels:
    testing.upbound.io/example-name: test_managed_instance_attach_profile_management
  name: test-managed-instance-attach-profile-management
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    managedInstanceId: ${var.osmh_managed_instance_unregistered_ocid}
    profileIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_profile
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
