apiVersion: networkloadbalancer.oci.m.upbound.io/v1alpha1
kind: NetworkLoadBalancersBackendSetsUnified
metadata:
  labels:
    testing.upbound.io/example-name: networkloadbalancersbackedsetsunified_label_1
  name: networkloadbalancersbackedsetsunified1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    networkLoadBalancerIdSelector:
      matchLabels:
