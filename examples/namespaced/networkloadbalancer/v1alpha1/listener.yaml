apiVersion: networkloadbalancer.oci.m.upbound.io/v1alpha1
kind: Listener
metadata:
  labels:
    testing.upbound.io/example-name: listener_label_1
  name: listener1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    networkLoadBalancerIdSelector:
      matchLabels:
        testing.upbound.io/example-name: networkloadbalancer_label_1
    defaultBackendSetName: "backendset1"
    name: "listener1"
    port: 80
    protocol: "TCP"
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
