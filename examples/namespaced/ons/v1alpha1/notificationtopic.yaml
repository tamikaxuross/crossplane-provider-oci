apiVersion: ons.oci.m.upbound.io/v1alpha1
kind: NotificationTopic
metadata:
  labels:
    testing.upbound.io/example-name: notificationtopic_label_1
  name: notificationtopic1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    name: notificationtopic1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
