apiVersion: ons.oci.m.upbound.io/v1alpha1
kind: Subscription
metadata:
  labels:
    testing.upbound.io/example-name: subscription_label_1
  name: subscription1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    endpoint: RobotNotExist@oracle.com
    protocol: EMAIL
    topicIdSelector:
      matchLabels:
        testing.upbound.io/example-name: notificationtopic_label_1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
