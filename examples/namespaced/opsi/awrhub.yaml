apiVersion: opsi.oci.m.upbound.io/v1alpha1
kind: AwrHub
metadata:
  annotations:
    meta.upbound.io/example-id: opsi/v1alpha1/awrhub
  labels:
    testing.upbound.io/example-name: test_awr_hub
  name: test-awr-hub
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    definedTags: ${map("${oci_identity_tag_namespace.tag-namespace1.name}.${oci_identity_tag.tag1.name}", "${var.awrhub_defined_tags_value}")}
    displayName: ${var.awrhub_display_name}
    freeformTags: ${var.awrhub_freeform_tags}
    objectStorageBucketNameSelector:
      matchLabels:
        testing.upbound.io/example-name: test_bucket
    operationsInsightsWarehouseIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_operations_insights_warehouse
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
