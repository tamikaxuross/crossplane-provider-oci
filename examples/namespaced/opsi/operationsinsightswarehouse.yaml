apiVersion: opsi.oci.m.upbound.io/v1alpha1
kind: OperationsInsightsWarehouse
metadata:
  annotations:
    meta.upbound.io/example-id: opsi/v1alpha1/operationsinsightswarehouse
  labels:
    testing.upbound.io/example-name: test_operations_insights_warehouse
  name: test-operations-insights-warehouse
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    cpuAllocated: ${var.warehouse_cpu_allocated}
    definedTags: ${map("${oci_identity_tag_namespace.tag-namespace1.name}.${oci_identity_tag.tag1.name}", "${var.warehouse_defined_tags_value}")}
    displayName: ${var.warehouse_display_name}
    freeformTags: ${var.warehouse_freeform_tags}
    storageAllocatedInGbs: ${var.storage_allocated_in_gbs}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
