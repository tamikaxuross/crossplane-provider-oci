apiVersion: logging.oci.m.upbound.io/v1alpha1
kind: Log
metadata:
  annotations:
    meta.upbound.io/example-id: logging/v1alpha1/log
  labels:
    testing.upbound.io/example-name: log_label_2
  name: log2
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    displayName: "log2"
    isEnabled: true
    logGroupIdSelector:
      matchLabels:
        testing.upbound.io/example-name: loggroup_label_1
    logType: CUSTOM
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
