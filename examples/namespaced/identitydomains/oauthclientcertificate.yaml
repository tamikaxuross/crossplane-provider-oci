apiVersion: identitydomains.oci.m.upbound.io/v1alpha1
kind: OauthClientCertificate
metadata:
  annotations:
    meta.upbound.io/example-id: identitydomains/v1alpha1/oauthclientcertificate
  labels:
    testing.upbound.io/example-name: test_oauth_client_certificate
  name: test-oauth-client-certificate
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    authorization: ${var.oauth_client_certificate_authorization}
    certificateAlias: ${var.oauth_client_certificate_certificate_alias}
    externalId: externalId
    idcsEndpoint: ${data.oci_identity_domain.test_domain.url}
    schemas:
      - urn:ietf:params:scim:schemas:oracle:idcs:OAuthClientCertificate
    x509base64certificate: ${var.oauth_client_certificate_x509base64certificate}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
