apiVersion: capacitymanagement.oci.m.upbound.io/v1alpha1
kind: OccCustomerGroupOccCustomer
metadata:
  annotations:
    meta.upbound.io/example-id: capacitymanagement/v1alpha1/occcustomergroupocccustomer
  labels:
    testing.upbound.io/example-name: test_occ_customer_group_occ_customer
  name: test-occ-customer-group-occ-customer
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    description: ${var.occ_customer_group_occ_customer_description}
    displayName: ${var.occ_customer_group_occ_customer_display_name}
    occCustomerGroupId: ${var.occ_customer_group_id}
    status: ${var.occ_customer_group_occ_customer_status}
    tenancyId: ${var.occ_customer_group-occ_customer_tenancy_id}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
