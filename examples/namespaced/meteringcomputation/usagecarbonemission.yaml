apiVersion: meteringcomputation.oci.m.upbound.io/v1alpha1
kind: UsageCarbonEmission
metadata:
  annotations:
    meta.upbound.io/example-id: meteringcomputation/v1alpha1/usagecarbonemission
  labels:
    testing.upbound.io/example-name: test_usage_carbon_emission
  name: test-usage-carbon-emission
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentDepth: 1
    groupBy:
      - service
    tenantId: ${var.tenancy_ocid}
    timeUsageEnded: ${var.time_usage_ended}
    timeUsageStarted: ${var.time_usage_started}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
