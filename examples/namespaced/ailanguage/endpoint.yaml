apiVersion: ailanguage.oci.m.upbound.io/v1alpha1
kind: Endpoint
metadata:
  annotations:
    meta.upbound.io/example-id: ailanguage/v1alpha1/endpoint
  labels:
    testing.upbound.io/example-name: test_endpoint
  name: test-endpoint
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    inferenceUnits: 1
    modelIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_model
    timeouts:
      - create: 60m
        delete: 60m
        update: 60m
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
