apiVersion: artifacts.oci.m.upbound.io/v1alpha1
kind: ContainerConfiguration
metadata:
  labels:
    testing.upbound.io/example-name: containerconfiguration_label_1
  name: containerconfiguration1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    isRepositoryCreatedOnFirstPush: False
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
