apiVersion: dns.oci.m.upbound.io/v1alpha1
kind: SteeringPolicy
metadata:
  labels:
    testing.upbound.io/example-name: steeringpolicy_label_1
  name: steeringpolicy1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: steeringpolicy1
    template: FAILOVER
    healthCheckMonitorIdRef:
      name: httpmonitor1
    rules:
      - ruleType: HEALTH
      - ruleType: LIMIT
        defaultCount: 1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
