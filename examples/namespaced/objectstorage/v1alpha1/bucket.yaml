apiVersion: objectstorage.oci.m.upbound.io/v1alpha1
kind: Bucket
metadata:
  labels:
    testing.upbound.io/example-name: bucket_label_1
  name: bucket1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # Refer to following terraform example for brief resource fields
    # https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/objectstorage_bucket
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    name: bucket1
    namespace: ${OBJECTSTORAGE_NAMESPACE}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
