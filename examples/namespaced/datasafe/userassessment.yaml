apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: UserAssessment
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/userassessment
  labels:
    testing.upbound.io/example-name: test_user_assessment
  name: test-user-assessment
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.description}
    displayName: ${var.display_name}
    targetId: ${var.data_safe_target_ocid}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
