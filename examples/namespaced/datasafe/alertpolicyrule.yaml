apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: AlertPolicyRule
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/alertpolicyrule
  labels:
    testing.upbound.io/example-name: test_alert_policy_rule
  name: test-alert-policy-rule
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    alertPolicyId: ${var.policy_id}
    description: ${var.alert_policy_rule_description}
    displayName: ${var.alert_policy_rule_display_name}
    expression: ${var.alert_policy_rule_expression}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
