apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: SetUserAssessmentBaselineManagement
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/setuserassessmentbaselinemanagement
  labels:
    testing.upbound.io/example-name: test_set_user_assessment_baseline_management
  name: test-set-user-assessment-baseline-management
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    targetId: ${var.data_safe_target_ocid}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
