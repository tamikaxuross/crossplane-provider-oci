apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: MaskingReportManagement
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/maskingreportmanagement
  labels:
    testing.upbound.io/example-name: test_masking_report_management
  name: test-masking-report-management
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    maskingPolicyId: ${var.masking_policy_id}
    targetId: ${var.data_safe_target_ocid}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
