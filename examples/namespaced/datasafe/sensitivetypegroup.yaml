apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: SensitiveTypeGroup
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/sensitivetypegroup
  labels:
    testing.upbound.io/example-name: test_sensitive_type_group
  name: test-sensitive-type-group
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.sensitive_type_group_description}
    displayName: ${var.sensitive_type_group_display_name}
    freeformTags: ${var.sensitive_type_group_freeform_tags}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
