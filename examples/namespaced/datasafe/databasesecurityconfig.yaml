apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: DatabaseSecurityConfig
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/databasesecurityconfig
  labels:
    testing.upbound.io/example-name: test_database_security_config
  name: test-database-security-config
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    databaseSecurityConfigId: ${var.database_security_config_ocid}
    description: ${var.database_security_config_description}
    displayName: ${var.database_security_config_display_name}
    freeformTags: ${var.database_security_config_freeform_tags}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
