apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: SecurityPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/securitypolicy
  labels:
    testing.upbound.io/example-name: test_security_policy
  name: test-security-policy
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.security_policy_description}
    displayName: ${var.security_policy_display_name}
    freeformTags: ${var.security_policy_freeform_tags}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
