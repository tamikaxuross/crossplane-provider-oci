apiVersion: datasafe.oci.m.upbound.io/v1alpha1
kind: SecurityPolicyDeploymentManagement
metadata:
  annotations:
    meta.upbound.io/example-id: datasafe/v1alpha1/securitypolicydeploymentmanagement
  labels:
    testing.upbound.io/example-name: test_security_policy_deployment_management
  name: test-security-policy-deployment-management
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    description: ${var.description}
    displayName: ${var.display_name}
    securityPolicyId: ${var.security_policy_id}
    targetId: ${var.data_safe_target_ocid}
    targetType: ${var.target_type}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
