apiVersion: adm.oci.m.upbound.io/v1alpha1
kind: RemediationRun
metadata:
  annotations:
    meta.upbound.io/example-id: adm/v1alpha1/remediationrun
  labels:
    testing.upbound.io/example-name: example_remediation_run
  name: example-remediation-run
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    displayName: example_remediation_run
    remediationRecipeIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example_remediation_recipe
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
