apiVersion: healthchecks.oci.m.upbound.io/v1alpha1
kind: PingProbe
metadata:
  labels:
    testing.upbound.io/example-name: pingprobe_label_1
  name: pingprobe1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    protocol: ICMP
    targets:
      - www.example.com
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
