apiVersion: kms.oci.m.upbound.io/v1alpha1
kind: VaultReplication
metadata:
  labels:
    testing.upbound.io/example-name: vaultreplication_label_1
  name: vaultreplication1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # ref: https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/kms_vault_replication
    replicaRegion: "us-phoenix-1"
    vaultIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vault_label_2
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
