apiVersion: kms.oci.m.upbound.io/v1alpha1
kind: KeyVersion
metadata:
  labels:
    testing.upbound.io/example-name: keyversion_label_1
  name: keyversion1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # ref: https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/kms_key_version
    keyIdSelector:
      matchLabels:
        testing.upbound.io/example-name: key_label_1
    managementEndpoint: ${VAULT_MANAGEMENT_ENDPOINT}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
