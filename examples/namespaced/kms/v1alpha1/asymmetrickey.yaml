apiVersion: kms.oci.m.upbound.io/v1alpha1
kind: Key
metadata:
  labels:
    testing.upbound.io/example-name: key_label_2
  name: key2
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # ref: https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/kms_key
    compartmentId: "${COMPARTMENT_OCID}"
    displayName: key2
    keyShape:
      - algorithm: "RSA"
        length: 256
    managementEndpoint: ${VAULT_MANAGEMENT_ENDPOINT}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
