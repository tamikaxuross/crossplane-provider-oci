apiVersion: recovery.oci.m.upbound.io/v1alpha1
kind: ProtectionPolicy
metadata:
  labels:
    testing.upbound.io/example-name: protectionpolicy_label_1
  name: protectionpolicy1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # Refer to following terraform example for brief resource fields
    # https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/recovery_protection_policy
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: protectionpolicy1
    backupRetentionPeriodInDays: 30
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
