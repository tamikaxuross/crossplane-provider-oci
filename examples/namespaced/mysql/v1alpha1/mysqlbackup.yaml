apiVersion: mysql.oci.m.upbound.io/v1alpha1
kind: MysqlBackup
metadata:
  labels:
    testing.upbound.io/example-name: mysqlbackup_label_1
  name: mysqlbackup1
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    # Refer to following terraform example for brief resource fields
    # https://registry.terraform.io/providers/oracle/oci/7.27.0/docs/resources/mysql_mysql_backup
    dbSystemIdSelector:
      matchLabels:
        testing.upbound.io/example-name: mysqldbsystem_label_1
    displayName: mysqlbackup1
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
