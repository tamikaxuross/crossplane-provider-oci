apiVersion: devops.oci.m.upbound.io/v1alpha1
kind: RepositoryMirror
metadata:
  annotations:
    meta.upbound.io/example-id: devops/v1alpha1/repositorymirror
  labels:
    testing.upbound.io/example-name: test_repository_mirror
  name: test-repository-mirror
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    repositoryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_mirrored_repository
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
