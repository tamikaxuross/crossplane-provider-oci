apiVersion: devops.oci.m.upbound.io/v1alpha1
kind: RepositoryRef
metadata:
  annotations:
    meta.upbound.io/example-id: devops/v1alpha1/repositoryref
  labels:
    testing.upbound.io/example-name: test_repository_ref
  name: test-repository-ref
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    commitId: ${lookup(data.oci_devops_repository_commits.test_repository_commits.repository_commit_collection[0].items[0], "commit_id")}
    refName: <refName>
    refType: BRANCH
    repositoryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_repository
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
