apiVersion: dbmulticloud.oci.m.upbound.io/v1alpha1
kind: OracleDbGcpKeyRing
metadata:
  annotations:
    meta.upbound.io/example-id: dbmulticloud/v1alpha1/oracledbgcpkeyring
  labels:
    testing.upbound.io/example-name: test_oracle_db_gcp_key_ring
  name: test-oracle-db-gcp-key-ring
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: ${var.oracle_db_gcp_key_ring_display_name}
    gcpKeyRingId: ${var.gcp_key_ring_id}
    location: ${var.oracle_db_gcp_key_ring_location}
    oracleDbConnectorId: ${var.oracle_db_gcp_oracle_db_connector_id}
    type: ${var.oracle_db_gcp_key_ring_type}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
