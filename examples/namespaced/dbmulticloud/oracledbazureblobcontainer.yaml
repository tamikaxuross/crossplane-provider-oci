apiVersion: dbmulticloud.oci.m.upbound.io/v1alpha1
kind: OracleDbAzureBlobContainer
metadata:
  annotations:
    meta.upbound.io/example-id: dbmulticloud/v1alpha1/oracledbazureblobcontainer
  labels:
    testing.upbound.io/example-name: test_oracle_db_azure_blob_container
  name: test-oracle-db-azure-blob-container
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    azureStorageAccountName: ADBDAppStorageAccounts
    azureStorageContainerName: ADBDContainers
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: TestDBAzureBlobContainerUpdate
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
