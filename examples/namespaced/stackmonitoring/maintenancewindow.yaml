apiVersion: stackmonitoring.oci.m.upbound.io/v1alpha1
kind: MaintenanceWindow
metadata:
  annotations:
    meta.upbound.io/example-id: stackmonitoring/v1alpha1/maintenancewindow
  labels:
    testing.upbound.io/example-name: test_maintenance_window_example
  name: test-maintenance-window-example
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    name: ${var.maintenance_window_name}
    resources:
      - areMembersIncluded: true
        resourceId: ${var.resource_id_for_maintwin}
    schedule:
      - scheduleType: ${var.maintenance_window_schedule_schedule_type}
        timeMaintenanceWindowEnd: ${var.maintenance_window_schedule_time_maintenance_window_end}
        timeMaintenanceWindowStart: ${var.maintenance_window_schedule_time_maintenance_window_start}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
