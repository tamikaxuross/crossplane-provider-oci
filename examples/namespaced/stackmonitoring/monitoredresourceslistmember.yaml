apiVersion: stackmonitoring.oci.m.upbound.io/v1alpha1
kind: MonitoredResourcesListMember
metadata:
  annotations:
    meta.upbound.io/example-id: stackmonitoring/v1alpha1/monitoredresourceslistmember
  labels:
    testing.upbound.io/example-name: test_monitored_resources_list_member
  name: test-monitored-resources-list-member
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    destinationResourceId: ${var.stack_mon_destination_resource_id}
    monitoredResourceId: ${var.stack_mon_source_resource_id}
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
