apiVersion: stackmonitoring.oci.m.upbound.io/v1alpha1
kind: MonitoredResource
metadata:
  annotations:
    meta.upbound.io/example-id: stackmonitoring/v1alpha1/monitoredresource
  labels:
    testing.upbound.io/example-name: test_monitored_resource
  name: test-monitored-resource
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: exampleDisplayName
    hostName: ${var.stack_mon_hostname_resource1}
    license: STANDARD_EDITION
    managementAgentId: ${var.stack_mon_management_agent_id_resource1}
    name: terraformExample
    properties:
      - name: osName
        value: Linux
      - name: osVersion
        value: "7.0"
    resourceTimeZone: en
    type: host
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
