apiVersion: database.oci.m.upbound.io/v1alpha1
kind: ManagementExternalExadataInfrastructureExadataManagement
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/managementexternalexadatainfrastructureexadatamanagement
  labels:
    testing.upbound.io/example-name: test_external_exadata_infrastructure_exadata_management
  name: test-external-exadata-infrastructure-exadata-management
  namespace: ${TARGET_NAMESPACE}
spec:
  forProvider:
    enableExadata: ${var.enable_exadata}
    externalExadataInfrastructureIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_external_exadata_infrastructure
  # providerConfig defaults to "ClusterProviderConfig"; set providerConfigRef to "ProviderConfig" to use namespaced providerConfig.
  providerConfigRef:
    name: default
    kind: ProviderConfig
