apiVersion: identity.oci.m.upbound.io/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: identity/v1alpha1/user
  labels:
    testing.upbound.io/example-name: test_user
  name: test-user
  namespace: upbound-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    definedTags:
      Operations.CostCenter: "42"
    description: ${var.user_description}
    email: ${var.user_email}
    freeformTags:
      Department: Finance
    name: ${var.user_name}
