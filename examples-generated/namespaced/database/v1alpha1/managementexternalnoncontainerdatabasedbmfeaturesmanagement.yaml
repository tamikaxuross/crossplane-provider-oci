apiVersion: database.oci.m.upbound.io/v1alpha1
kind: ManagementExternalnoncontainerdatabaseDbmFeaturesManagement
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/managementexternalnoncontainerdatabasedbmfeaturesmanagement
  labels:
    testing.upbound.io/example-name: test_externalnoncontainerdatabase_external_non_container_dbm_features_management
  name: test-externalnoncontainerdatabase-external-non-container-dbm-features-management
  namespace: upbound-system
spec:
  forProvider:
    enableExternalNonContainerDbmFeature: ${var.enable_external_non_container_dbm_feature}
    externalNonContainerDatabaseIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_external_non_container_database
    featureDetails:
    - canEnableAllCurrentPdbs: ${var.externalnoncontainerdatabase_external_non_container_dbm_features_management_feature_details_can_enable_all_current_pdbs}
      connectorDetails:
      - connectorType: ${var.externalnoncontainerdatabase_external_non_container_dbm_features_management_feature_details_connector_details_connector_type}
        databaseConnectorId: ${oci_database_management_database_connector.test_database_connector.id}
        managementAgentIdSelector:
          matchLabels:
            testing.upbound.io/example-name: test_management_agent
        privateEndPointId: ${oci_database_management_private_end_point.test_private_end_point.id}
      enable_external_non_container_dbm_feature: ${var.enable_external_non_container_dbm_feature}
      feature: ${var.externalnoncontainerdatabase_external_non_container_dbm_features_management_feature_details_feature}
      isAutoEnablePluggableDatabase: ${var.externalnoncontainerdatabase_external_non_container_dbm_features_management_feature_details_is_auto_enable_pluggable_database}
      licenseModel: ${var.externalnoncontainerdatabase_external_non_container_dbm_features_management_feature_details_license_model}
